<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio work — animation breakdown." />
    <title>Work</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700;6..72,800&family=Manrope:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#121416",
              surface: "#121416",
              "surface-dim": "#121416",
              "surface-bright": "#37393b",
              "surface-container-lowest": "#0c0e10",
              "surface-container-low": "#1a1c1e",
              "surface-container": "#1e2022",
              "surface-container-high": "#282a2c",
              "surface-container-highest": "#333537",
              "surface-variant": "#333537",

              primary: "#8b0000",
              "primary-container": "#8b0000",
              "primary-fixed": "#ffb4a8",
              "primary-fixed-dim": "#ff907f",
              "on-primary": "#ffffff",
              "on-primary-container": "#ffffff",
              "on-primary-fixed": "#410000",
              "on-primary-fixed-variant": "#920703",
              "inverse-primary": "#b52619",
              "surface-tint": "#ffb4a8",

              secondary: "#bbcabf",
              "secondary-container": "#3c4a41",
              "on-secondary": "#26332c",
              "on-secondary-container": "#aab9ae",

              tertiary: "#c1c7ce",
              "tertiary-container": "#3d4348",
              "on-tertiary": "#2b3136",
              "on-tertiary-container": "#aaafb6",

              error: "#ffb4ab",
              "error-container": "#93000a",
              "on-error": "#690005",
              "on-error-container": "#ffdad6",

              outline: "#aa8984",
              "outline-variant": "#5a403c",

              "on-background": "#e2e2e5",
              "on-surface": "#e2e2e5",
              "on-surface-variant": "#e3beb8",
              "inverse-surface": "#e2e2e5",
              "inverse-on-surface": "#2f3133",
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Newsreader", "serif"],
              body: ["Manrope", "system-ui", "sans-serif"],
              label: ["Space Grotesk", "ui-monospace", "monospace"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body
    data-page="detail"
    class="bg-background text-on-background font-body antialiased selection:bg-primary selection:text-on-primary overflow-x-hidden"
  >
    <a class="skip" href="#main">Skip to content</a>

    <header
      class="site-header fixed top-0 z-50 w-full border-b border-outline-variant/15 bg-surface/80 backdrop-blur-xl"
    >
      <div
        class="header-bar flex w-full max-w-screen-2xl mx-auto items-center justify-between gap-3 px-4 py-4 md:px-12 md:py-6"
      >
        <a
          class="logo font-headline text-lg font-extrabold uppercase tracking-widest text-on-surface md:text-2xl shrink-0 min-w-0 truncate"
          href="index.html"
          data-site-brand
          data-reveal
          style="--reveal-delay: 0ms; --reveal-y: 0.5rem"
          >Portfolio</a
        >
        <button
          type="button"
          class="nav-toggle md:hidden inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-outline-variant/40 text-on-surface/70 hover:border-primary/40 hover:text-on-surface focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-surface"
          aria-expanded="false"
          aria-controls="site-nav"
        >
          <span class="material-symbols-outlined text-2xl" aria-hidden="true"
            >menu</span
          >
          <span class="sr-only">Open menu</span>
        </button>
        <nav
          class="site-nav flex min-w-0 max-w-[55%] flex-1 flex-wrap items-center justify-end gap-4 overflow-x-auto font-headline text-xs font-medium uppercase tracking-tighter text-on-surface/60 md:max-w-none md:justify-center md:gap-8 md:text-sm lg:gap-10"
          id="site-nav"
          aria-label="Primary"
        >
          <a
            class="site-nav-link border-b-2 border-transparent pb-1 font-headline text-sm uppercase tracking-tighter text-on-surface/60 transition-colors duration-300 hover:border-primary hover:text-on-surface"
            href="index.html"
            data-nav="portfolio"
            >Portfolio</a
          >
          <a
            class="site-nav-link border-b-2 border-transparent pb-1 font-headline text-sm uppercase tracking-tighter text-on-surface/60 transition-colors duration-300 hover:border-primary hover:text-on-surface"
            href="games.html"
            data-nav="games"
            >Games</a
          >
          <a
            class="site-nav-link border-b-2 border-transparent pb-1 font-headline text-sm uppercase tracking-tighter text-on-surface/60 transition-colors duration-300 hover:border-primary hover:text-on-surface"
            href="about.html"
            data-nav="about"
            >About</a
          >
        </nav>
        <nav
          class="hidden min-w-0 max-w-[28%] flex-1 flex-wrap items-center justify-end gap-2 overflow-x-auto font-label text-[10px] font-medium uppercase tracking-widest text-on-surface/40 lg:flex xl:gap-3"
          id="toc-nav"
          aria-label="On this page"
        ></nav>
        <div class="header-actions hidden shrink-0 items-center gap-3 sm:flex">
          <button
            type="button"
            class="btn-share rounded-full bg-primary-container px-6 py-2.5 font-label text-xs font-bold uppercase tracking-widest text-on-primary transition-all duration-300 hover:brightness-110 active:opacity-80 md:px-8"
            id="share-btn"
            data-reveal
            style="--reveal-delay: 90ms; --reveal-y: 0.5rem"
          >
            Share
          </button>
        </div>
      </div>
    </header>

    <main id="main" class="entry-main">
      <article
        class="entry relative"
        itemscope
        itemtype="https://schema.org/CreativeWork"
      >
        <div
          id="hero-root"
          class="relative flex min-h-screen flex-col items-center justify-end overflow-hidden pt-24"
        >
          <div class="pointer-events-none absolute inset-0 z-0">
            <div class="hero-ambient z-[1]" aria-hidden="true">
              <div class="hero-orb hero-orb--a"></div>
              <div class="hero-orb hero-orb--b"></div>
              <div class="hero-orb hero-orb--c"></div>
            </div>
            <div
              id="hero-parallax-root"
              class="absolute inset-0 z-[2] overflow-hidden"
            >
              <img
                id="hero-bg-img"
                class="hero-bg-img h-full w-full object-cover opacity-60 grayscale transition-all duration-1000 hover:grayscale-0"
                alt=""
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrAwvnvXWM-cWBrEtvD6NPPF5yspRHgl9I9yF8chxvXqszOnY7dIUgcVrlFduM-hNDpYqfiHFKG_UpYADGKYVplHakJZ4cS1i2Wno3kqAOmX-stPVpBh-009Iw3Ld6YIsvn1c-WmsEtOaf9L63ZkzJaYj1sA7a4_9M6oDZpxUB6Vbt_RTPkO4kWN2eZc7P3i7_MucZyZzSz4uJCx2rKkO4sdJWKKVQR2AZiKYBtuKQRIaTtN0-9khg1yrDTNuC2sCO3-VR0Rr1mWusN"
              />
            </div>
            <canvas
              id="fx-canvas"
              class="fx-canvas pointer-events-none absolute inset-0 z-[9] h-full w-full"
              aria-hidden="true"
            ></canvas>
            <div
              class="absolute inset-0 z-10 bg-gradient-to-t from-background via-transparent to-transparent"
            ></div>
            <div
              class="absolute inset-0 z-10 bg-gradient-to-r from-background via-transparent to-background/90"
            ></div>
          </div>

          <div
            class="entry-head relative z-20 container mx-auto w-full max-w-4xl px-6 text-center"
          >
            <div
              id="lottie-slot"
              class="pointer-events-none absolute bottom-0 right-0 z-30 h-20 w-20 opacity-80 md:h-24 md:w-24"
              aria-hidden="true"
            ></div>
            <div class="entry-head-inner">
              <p
                class="entry-badge mb-6 inline-flex items-center gap-3 border border-outline-variant/20 bg-surface-container-highest/35 px-4 py-2 font-label text-[9px] font-bold uppercase tracking-[0.35em] text-primary-fixed backdrop-blur-sm"
                data-reveal
                style="--reveal-delay: 0ms"
              >
                <span
                  class="h-2 w-2 animate-pulse rounded-full bg-primary-fixed"
                  aria-hidden="true"
                ></span>
                <span id="entry-badge">Portfolio entry</span>
              </p>
              <h1
                class="entry-title entry-title-live mb-6 font-headline text-6xl font-extrabold uppercase leading-[0.85] tracking-tighter md:text-8xl"
                id="entry-title"
                data-reveal
                style="--reveal-delay: 80ms"
              >
                Work
              </h1>
              <p
                class="entry-byline mb-4 font-body text-sm text-on-surface/60 md:text-base"
                id="entry-byline"
                data-reveal
                style="--reveal-delay: 150ms"
              ></p>
              <div
                class="entry-cats mb-6 flex flex-wrap justify-center gap-2"
                id="entry-categories"
                data-reveal
                style="--reveal-delay: 210ms"
              ></div>
              <p
                class="entry-excerpt mx-auto max-w-2xl font-body text-lg leading-relaxed text-on-surface/75 md:text-xl"
                id="entry-excerpt"
                data-reveal
                style="--reveal-delay: 270ms"
              ></p>
            </div>
          </div>

          <div
            class="hero-feature relative z-20 mt-12 w-full max-w-5xl px-6"
            id="hero-slot"
            hidden
          >
            <div
              class="frame hero-frame relative aspect-video w-full overflow-hidden rounded-xl border border-outline-variant/30 bg-black shadow-2xl"
            >
              <iframe
                id="hero-iframe"
                class="embed absolute inset-0 h-full w-full border-0"
                src="about:blank"
                title="Showreel"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
              ></iframe>
            </div>
          </div>
        </div>

        <div
          class="article-body article-body-live relative mx-auto max-w-screen-2xl space-y-0 bg-surface px-6 py-24 md:px-12"
        >
          <div class="article-ambient" aria-hidden="true">
            <span class="article-orb article-orb--1"></span>
            <span class="article-orb article-orb--2"></span>
          </div>
          <canvas
            id="fx-canvas-article"
            class="fx-canvas-article pointer-events-none absolute inset-0 z-[0] h-full w-full"
            aria-hidden="true"
          ></canvas>
          <div id="article-sections"></div>

          <section
            class="article-section final-block reveal-section mb-16 scroll-mt-28 rounded-xl border border-outline-variant/20 bg-surface-container-low/40 p-8 md:p-10"
            id="final-thoughts"
            aria-label="Final thoughts"
            data-reveal
          ></section>

          <section
            class="article-section thanks-section reveal-section mb-16 scroll-mt-28 rounded-xl border border-outline-variant/20 bg-surface-container-low/40 p-8 md:p-10"
            id="thanks-block"
            aria-label="Thanks"
            data-reveal
          ></section>

          <section
            class="article-section tags-section mb-16 scroll-mt-28 border-t border-outline-variant/30 pt-10"
            aria-label="Tags"
          >
            <div
              class="tags-row flex flex-wrap gap-2"
              id="tags-row"
              data-reveal
            ></div>
          </section>

          <section
            class="article-section contact-section reveal-section scroll-mt-28 rounded-xl border border-outline-variant/20 bg-surface-container-low/40 p-8 md:p-10"
            id="contact"
            data-reveal
          >
            <h2
              class="article-h2 mb-6 font-headline text-4xl font-bold uppercase tracking-tighter text-white md:text-5xl"
            >
              Contact
            </h2>
            <p
              class="prose-p contact-lede mb-6 max-w-xl text-lg text-on-surface-variant"
            >
              For hiring or collaboration, reach out on LinkedIn or email.
            </p>
            <ul class="contact-links flex flex-wrap gap-6">
              <li>
                <a
                  class="font-headline font-bold text-primary transition-colors hover:text-primary-fixed"
                  id="link-linkedin"
                  href="#"
                  rel="noopener noreferrer"
                  >LinkedIn</a
                >
              </li>
              <li>
                <a
                  class="font-headline font-bold text-primary transition-colors hover:text-primary-fixed"
                  id="link-email"
                  href="#"
                  >Email</a
                >
              </li>
            </ul>
          </section>
        </div>
      </article>
    </main>

    <footer
      class="site-footer bg-surface-container-lowest px-6 py-16 md:px-12"
      data-reveal
      style="--reveal-y: 2rem"
    >
      <div
        class="mx-auto mb-12 block h-px w-full max-w-screen-2xl bg-outline-variant/20"
      ></div>
      <div
        class="footer-inner mx-auto flex max-w-screen-2xl flex-col items-center justify-center gap-6 text-center font-label text-[10px] uppercase tracking-widest text-on-surface/40 md:flex-row md:flex-wrap md:justify-between md:text-left"
      >
        <p class="max-w-lg normal-case font-body tracking-normal text-on-surface/50" id="footer-tagline"></p>
        <div class="flex flex-col items-center gap-4 sm:flex-row sm:gap-8">
          <a
            class="font-label font-bold text-primary-fixed transition-colors hover:text-on-surface"
            id="footer-email"
            href="#"
            >Email</a
          >
          <a
            id="footer-cv"
            class="font-label font-bold text-on-surface/50 transition-colors hover:text-on-surface"
            href="#"
            hidden
            >CV</a
          >
        </div>
      </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
