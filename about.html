<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="About me — background and contact." />
    <title>About</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700;6..72,800&family=Manrope:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#121416",
              surface: "#121416",
              "surface-dim": "#121416",
              "surface-bright": "#37393b",
              "surface-container-lowest": "#0c0e10",
              "surface-container-low": "#1a1c1e",
              "surface-container": "#1e2022",
              "surface-container-high": "#282a2c",
              "surface-container-highest": "#333537",
              "surface-variant": "#333537",

              primary: "#8b0000",
              "primary-container": "#8b0000",
              "primary-fixed": "#ffb4a8",
              "primary-fixed-dim": "#ff907f",
              "on-primary": "#ffffff",
              "on-primary-container": "#ffffff",
              "on-primary-fixed": "#410000",
              "on-primary-fixed-variant": "#920703",
              "inverse-primary": "#b52619",
              "surface-tint": "#ffb4a8",

              secondary: "#bbcabf",
              "secondary-container": "#3c4a41",
              "on-secondary": "#26332c",
              "on-secondary-container": "#aab9ae",

              tertiary: "#c1c7ce",
              "tertiary-container": "#3d4348",
              "on-tertiary": "#2b3136",
              "on-tertiary-container": "#aaafb6",

              error: "#ffb4ab",
              "error-container": "#93000a",
              "on-error": "#690005",
              "on-error-container": "#ffdad6",

              outline: "#aa8984",
              "outline-variant": "#5a403c",

              "on-background": "#e2e2e5",
              "on-surface": "#e2e2e5",
              "on-surface-variant": "#e3beb8",
              "inverse-surface": "#e2e2e5",
              "inverse-on-surface": "#2f3133",
            },
            fontFamily: {
              headline: ["Newsreader", "serif"],
              body: ["Manrope", "system-ui", "sans-serif"],
              label: ["Space Grotesk", "ui-monospace", "monospace"],
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body
    data-page="hub-about"
    class="bg-background text-on-background font-body antialiased selection:bg-primary selection:text-on-primary overflow-x-hidden"
  >
    <a class="skip" href="#main">Skip to content</a>

    <header
      class="site-header fixed top-0 z-50 w-full border-b border-outline-variant/15 bg-surface/80 backdrop-blur-xl"
    >
      <div
        class="header-bar flex w-full max-w-screen-2xl mx-auto items-center justify-between gap-3 px-4 py-4 md:px-12 md:py-6"
      >
        <a
          class="logo font-headline text-lg font-extrabold uppercase tracking-widest text-on-surface md:text-2xl shrink-0 min-w-0 truncate"
          href="index.html"
          data-site-brand
          >Portfolio</a
        >
        <button
          type="button"
          class="nav-toggle md:hidden inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-outline-variant/40 text-on-surface/70 hover:border-primary/40 hover:text-on-surface focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-surface"
          aria-expanded="false"
          aria-controls="site-nav"
        >
          <span class="material-symbols-outlined text-2xl" aria-hidden="true"
            >menu</span
          >
          <span class="sr-only">Open menu</span>
        </button>
        <nav
          class="site-nav flex min-w-0 flex-1 flex-wrap items-center justify-end gap-4 font-headline text-xs font-medium uppercase tracking-tighter text-on-surface/60 md:static md:justify-center md:gap-8 md:text-sm lg:gap-10"
          id="site-nav"
          aria-label="Primary"
        >
          <a
            class="site-nav-link border-b-2 border-transparent pb-1 text-sm uppercase tracking-tighter text-on-surface/60 transition-colors duration-300 hover:border-primary hover:text-on-surface"
            href="index.html"
            data-nav="portfolio"
            >Portfolio</a
          >
          <a
            class="site-nav-link border-b-2 border-transparent pb-1 text-sm uppercase tracking-tighter text-on-surface/60 transition-colors duration-300 hover:border-primary hover:text-on-surface"
            href="games.html"
            data-nav="games"
            >Games</a
          >
          <a
            class="site-nav-link border-b-2 border-transparent pb-1 text-sm uppercase tracking-tighter text-on-surface/60 transition-colors duration-300 hover:border-primary hover:text-on-surface"
            href="about.html"
            data-nav="about"
            >About</a
          >
        </nav>
        <div class="header-actions hidden shrink-0 items-center gap-3 sm:flex">
          <button
            type="button"
            class="btn-share rounded-full bg-primary-container px-6 py-2.5 font-label text-xs font-bold uppercase tracking-widest text-on-primary transition-all duration-300 hover:brightness-110 active:opacity-80 md:px-8"
            id="share-btn"
          >
            Share
          </button>
        </div>
      </div>
    </header>

    <main id="main" class="pt-28 pb-24">
      <section class="relative overflow-hidden px-6 md:px-12">
        <div class="mx-auto max-w-screen-2xl">
          <div class="relative overflow-hidden border border-outline-variant/15 bg-surface-container-low/40">
            <div class="pointer-events-none absolute inset-0 opacity-40" aria-hidden="true">
              <div class="absolute -left-32 -top-24 h-80 w-80 rounded-full bg-secondary-container/50 blur-3xl"></div>
              <div class="absolute -right-24 -bottom-24 h-80 w-80 rounded-full bg-primary-container/30 blur-3xl"></div>
            </div>
            <div class="relative px-8 py-14 md:px-14">
              <p class="mb-4 font-label text-[10px] font-bold uppercase tracking-[0.4em] text-primary-fixed">
                Profile identity
              </p>
              <h1 class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface md:text-7xl">
                About
              </h1>
              <p class="mt-4 max-w-2xl font-body text-lg text-on-surface/70">
                Background, tools, and how to get in touch.
              </p>
            </div>
          </div>
        </div>
      </section>

      <div class="mx-auto mt-14 max-w-screen-2xl px-6 md:px-12">
        <article id="about-root" class="about-article"></article>

        <section
          class="contact-section reveal-section mt-16 scroll-mt-28 rounded-xl border border-outline-variant/20 bg-surface-container-low/40 p-8 md:p-10"
          id="contact"
          aria-label="Contact"
          data-reveal
        >
          <h2
            class="article-h2 mb-6 font-headline text-3xl font-bold uppercase tracking-tighter text-white md:text-4xl"
          >
            Contact
          </h2>
          <p
            class="prose-p contact-lede mb-6 max-w-xl text-lg text-on-surface-variant"
          >
            For hiring or collaboration, reach out on LinkedIn or email.
          </p>
          <ul class="contact-links flex flex-wrap gap-6">
            <li>
              <a
                class="font-headline font-bold text-primary transition-colors hover:text-primary-fixed"
                id="link-linkedin"
                href="#"
                rel="noopener noreferrer"
                >LinkedIn</a
              >
            </li>
            <li>
              <a
                class="font-headline font-bold text-primary transition-colors hover:text-primary-fixed"
                id="link-email"
                href="#"
                >Email</a
              >
            </li>
          </ul>
        </section>
      </div>
    </main>

    <footer class="site-footer bg-surface-container-lowest px-6 py-16 md:px-12">
      <div
        class="mx-auto mb-12 block h-px w-full max-w-screen-2xl bg-outline-variant/20"
      ></div>
      <div
        class="footer-inner mx-auto flex max-w-screen-2xl flex-col items-center justify-center gap-6 text-center font-label text-[10px] uppercase tracking-widest text-on-surface/40 md:flex-row md:flex-wrap md:justify-between md:text-left"
      >
        <p class="max-w-lg normal-case font-body tracking-normal text-on-surface/50" id="footer-tagline"></p>
        <div class="flex flex-col items-center gap-4 sm:flex-row sm:gap-8">
          <a
            class="font-label font-bold text-primary-fixed transition-colors hover:text-on-surface"
            id="footer-email"
            href="#"
            >Email</a
          >
          <a
            id="footer-cv"
            class="font-label font-bold text-on-surface/50 transition-colors hover:text-on-surface"
            href="#"
            hidden
            >CV</a
          >
        </div>
      </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
